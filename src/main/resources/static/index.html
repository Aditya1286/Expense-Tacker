<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpenseTracker | Premium Finance Management</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>ExpenseTracker</h1>
            <p style="color: var(--text-muted)">Manage your wealth with elegance</p>
        </header>

        <div class="summary-card">
            <div>
                <p class="total-label">Total Expenses</p>
                <h2 class="total-amount" id="total-amount">$0.00</h2>
            </div>
            <div style="background: rgba(99, 102, 241, 0.1); padding: 1rem; border-radius: 1rem;">
                <i data-lucide="wallet" style="color: var(--primary); width: 32px; height: 32px;"></i>
            </div>
        </div>

        <div class="input-card">
            <form id="expense-form" class="form-grid">
                <div class="input-group">
                    <label for="title">DESCRIPTION</label>
                    <input type="text" id="title" placeholder="What did you spend on?" required>
                </div>
                <div class="input-group">
                    <label for="amount">AMOUNT</label>
                    <input type="number" id="amount" step="0.01" placeholder="0.00" required>
                </div>
                <div class="input-group">
                    <label for="category">CATEGORY</label>
                    <select id="category">
                        <option value="Food">Food</option>
                        <option value="Transport">Transport</option>
                        <option value="Entertainment">Entertainment</option>
                        <option value="Shopping">Shopping</option>
                        <option value="Bills">Bills</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <button type="submit" class="btn-add">Add Expense</button>
            </form>
        </div>

        <div id="expense-list" class="expense-list">
            <!-- Expenses will be injected here -->
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
